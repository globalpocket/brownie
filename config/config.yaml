agent:
  polling_interval_sec: 15
  max_auto_retries: 30
  max_llm_retries: 5
  max_history_steps: 15 # 履歴保持件数。DB肥大化防止。
  oob_webhook_url: "" # トークン失効・LLM停止等のFatalエラー用
  queue_ux_notification: true # 順番待ち時にGitHubへ推定時間をコメント
  inference_priority: # タスク優先度 (1=高)
    manual_issue: 1
    review_comment: 2
    auto_wiki: 3
  repositories:
    - "globalpocket/brownie"
llm:
  endpoint: "http://localhost:8080/v1"
  timeout_sec: 180
  tokenizer: "auto"
  models:
    router: "mlx-community/Meta-Llama-3.1-8B-Instruct-4bit"
    coder: "mlx-community/Qwen3.5-27B-4bit"  # Qwen 3.5 (MoE) for implementation/self-correction
workspace:
  sandbox_user_id: 1000
  sandbox_group_id: 1000
  lfs_enabled: true
  base_dir: "/tmp/brownie_workspace"
database:
  db_path: "~/.local/share/brownie/brownie.db"
  memory_path: "~/.local/share/brownie/vector_db"
